<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A 30-day hands-on Kubernetes internals and production troubleshooting course.">
  <title>Kubernetes Internals: 30-Day Production Mastery</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⎈</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #326ce5; }
    body { color: #263238; }
    .markdown-section { max-width: 980px; }
    .markdown-section h1, .markdown-section h2 { letter-spacing: -0.02em; }
    .markdown-section code { border-radius: 4px; }
    .markdown-section blockquote { border-left-color: #326ce5; background: #f5f8ff; padding: .8rem 1rem; }
    .sidebar-nav > ul > li > p { font-weight: 700; margin: 1rem 0 .35rem; color: #1f3f78; }
    .app-name-link { font-weight: 800; }
    table { display: table !important; width: 100%; }
    .progress { position: fixed; left: 0; top: 0; height: 3px; background: #326ce5; z-index: 9999; }
  </style>
</head>
<body>
  <div id="app">Loading the course…</div>
  <script>
    window.$docsify = {
      name: 'Kubernetes Internals · 30 Days',
      repo: '',
      homepage: 'README.md',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 2,
      maxLevel: 3,
      relativePath: true,
      search: { placeholder: 'Search concepts, labs, incidents…', noData: 'No results', depth: 4 },
      copyCode: { buttonText: 'Copy', errorText: 'Error', successText: 'Copied' },
      pagination: { previousText: 'Previous', nextText: 'Next', crossChapter: true },
      mermaidConfig: { querySelector: '.mermaid' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });</script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>
</body>
</html>
