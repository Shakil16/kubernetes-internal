apiVersion: v1
kind: Pod
metadata:
  name: failure-pending
  namespace: k8s-30d
  labels: {failure: pending}
spec:
  nodeSelector:
    course.example.com/nonexistent: "true"
  containers:
    - name: app
      image: busybox:1.36.1
      command: ["sleep", "7d"]
---
apiVersion: v1
kind: Pod
metadata:
  name: failure-crashloop
  namespace: k8s-30d
  labels: {failure: crashloop}
spec:
  containers:
    - name: app
      image: busybox:1.36.1
      command: ["sh", "-c", "echo configuration missing >&2; exit 42"]
---
apiVersion: v1
kind: Pod
metadata:
  name: failure-imagepull
  namespace: k8s-30d
  labels: {failure: imagepull}
spec:
  containers:
    - name: app
      image: invalid.example.invalid/course/image:does-not-exist
---
apiVersion: v1
kind: Pod
metadata:
  name: failure-oom
  namespace: k8s-30d
  labels: {failure: oom}
spec:
  containers:
    - name: app
      image: polinux/stress:1.0.4
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "64M", "--vm-hang", "1"]
      resources:
        requests: {memory: 8Mi}
        limits: {memory: 24Mi}

