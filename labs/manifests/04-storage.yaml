apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: course-data
  namespace: k8s-30d
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: storage-writer
  namespace: k8s-30d
spec:
  containers:
    - name: writer
      image: busybox:1.36.1
      command: ["sh", "-c", "while true; do date -Iseconds >> /data/history; sleep 10; done"]
      resources:
        requests: {cpu: 5m, memory: 8Mi}
        limits: {cpu: 50m, memory: 32Mi}
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: course-data

