apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: k8s-30d-important
value: 100000
globalDefault: false
description: Priority used only by the Kubernetes 30-day scheduling lab.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: placement-demo
  namespace: k8s-30d
spec:
  replicas: 3
  selector:
    matchLabels:
      app: placement-demo
  template:
    metadata:
      labels:
        app: placement-demo
    spec:
      priorityClassName: k8s-30d-important
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: placement-demo
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: placement-demo
      containers:
        - name: sleeper
          image: busybox:1.36.1
          command: ["sh", "-c", "sleep 7d"]
          resources:
            requests: {cpu: 10m, memory: 8Mi}
            limits: {cpu: 50m, memory: 32Mi}

