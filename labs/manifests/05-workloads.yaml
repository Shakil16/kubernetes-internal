apiVersion: v1
kind: Service
metadata:
  name: identity
  namespace: k8s-30d
spec:
  clusterIP: None
  selector:
    app: identity
  ports:
    - name: peer
      port: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: identity
  namespace: k8s-30d
spec:
  serviceName: identity
  replicas: 3
  selector:
    matchLabels:
      app: identity
  template:
    metadata:
      labels:
        app: identity
    spec:
      containers:
        - name: identity
          image: busybox:1.36.1
          command: ["sh", "-c", "echo $(hostname) > /state/identity; sleep 7d"]
          resources:
            requests: {cpu: 5m, memory: 8Mi}
            limits: {cpu: 50m, memory: 32Mi}
          volumeMounts:
            - name: state
              mountPath: /state
      volumes:
        - name: state
          emptyDir: {}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-agent
  namespace: k8s-30d
spec:
  selector:
    matchLabels:
      app: node-agent
  template:
    metadata:
      labels:
        app: node-agent
    spec:
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: busybox:1.36.1
          command: ["sh", "-c", "echo running-on-$NODE_NAME; sleep 7d"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests: {cpu: 5m, memory: 8Mi}
            limits: {cpu: 50m, memory: 32Mi}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: report-once
  namespace: k8s-30d
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: report
          image: busybox:1.36.1
          command: ["sh", "-c", "echo report-start; sleep 3; echo report-complete"]
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: heartbeat
  namespace: k8s-30d
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: heartbeat
              image: busybox:1.36.1
              command: ["date", "-Iseconds"]

