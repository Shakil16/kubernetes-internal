apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-reader
  namespace: k8s-30d
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: k8s-30d
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["web-content"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-reader
  namespace: k8s-30d
subjects:
  - kind: ServiceAccount
    name: pod-reader
    namespace: k8s-30d
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-reader

