apiVersion: apps/v1
kind: Deployment
metadata:
  name: scalable-web
  namespace: k8s-30d
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scalable-web
  template:
    metadata:
      labels:
        app: scalable-web
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: server
          image: registry.k8s.io/hpa-example:latest
          ports:
            - name: http
              containerPort: 80
          resources:
            requests: {cpu: 100m, memory: 32Mi}
            limits: {cpu: 500m, memory: 128Mi}
          startupProbe:
            httpGet: {path: /, port: http}
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet: {path: /, port: http}
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /, port: http}
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: scalable-web
  namespace: k8s-30d
spec:
  selector:
    app: scalable-web
  ports:
    - port: 80
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scalable-web
  namespace: k8s-30d
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scalable-web
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: scalable-web
  namespace: k8s-30d
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: scalable-web

