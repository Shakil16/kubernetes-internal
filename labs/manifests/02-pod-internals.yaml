apiVersion: v1
kind: Pod
metadata:
  name: pod-internals
  namespace: k8s-30d
  labels:
    app: pod-internals
spec:
  restartPolicy: Always
  initContainers:
    - name: initialize
      image: busybox:1.36.1
      command: ["sh", "-c", "echo initialized-at-$(date -Iseconds) > /work/status && sleep 2"]
      volumeMounts:
        - name: work
          mountPath: /work
  containers:
    - name: application
      image: busybox:1.36.1
      command: ["sh", "-c", "while true; do echo app-$(date -Iseconds) >> /work/app.log; sleep 5; done"]
      resources:
        requests: {cpu: 5m, memory: 8Mi}
        limits: {cpu: 50m, memory: 32Mi}
      volumeMounts:
        - name: work
          mountPath: /work
    - name: log-sidecar
      image: busybox:1.36.1
      command: ["sh", "-c", "touch /work/app.log; tail -n+1 -F /work/app.log"]
      resources:
        requests: {cpu: 5m, memory: 8Mi}
        limits: {cpu: 50m, memory: 32Mi}
      volumeMounts:
        - name: work
          mountPath: /work
  volumes:
    - name: work
      emptyDir: {}

