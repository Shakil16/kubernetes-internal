{{- if .Values.labs.rbac.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-reader
  namespace: {{ include "kubernetes-internals.namespace" . }}
  labels:
    {{- include "kubernetes-internals.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: {{ include "kubernetes-internals.namespace" . }}
  labels:
    {{- include "kubernetes-internals.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["web-content"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-reader
  namespace: {{ include "kubernetes-internals.namespace" . }}
  labels:
    {{- include "kubernetes-internals.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: pod-reader
    namespace: {{ include "kubernetes-internals.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-reader
{{- end }}
