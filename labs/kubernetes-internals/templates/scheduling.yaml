{{- if .Values.labs.scheduling.enabled }}
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ .Values.labs.scheduling.priorityClassName }}
  labels:
    {{- include "kubernetes-internals.labels" . | nindent 4 }}
value: 100000
globalDefault: false
description: Priority used only by the Kubernetes 30-day scheduling lab.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: placement-demo
  namespace: {{ include "kubernetes-internals.namespace" . }}
  labels:
    {{- include "kubernetes-internals.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.labs.scheduling.replicas }}
  selector:
    matchLabels:
      app: placement-demo
  template:
    metadata:
      labels:
        app: placement-demo
    spec:
      priorityClassName: {{ .Values.labs.scheduling.priorityClassName }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: placement-demo
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: placement-demo
      containers:
        - name: sleeper
          image: {{ .Values.images.busybox | quote }}
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "sleep 7d"]
          resources:
            requests: {cpu: 10m, memory: 8Mi}
            limits: {cpu: 50m, memory: 32Mi}
{{- end }}
