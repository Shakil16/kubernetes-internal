{{- if .Values.labs.storage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: course-data
  namespace: {{ include "kubernetes-internals.namespace" . }}
  labels:
    {{- include "kubernetes-internals.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with .Values.labs.storage.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.labs.storage.size }}
---
apiVersion: v1
kind: Pod
metadata:
  name: storage-writer
  namespace: {{ include "kubernetes-internals.namespace" . }}
  labels:
    {{- include "kubernetes-internals.labels" . | nindent 4 }}
spec:
  containers:
    - name: writer
      image: {{ .Values.images.busybox | quote }}
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c", "while true; do date -Iseconds >> /data/history; sleep 10; done"]
      resources:
        requests: {cpu: 5m, memory: 8Mi}
        limits: {cpu: 50m, memory: 32Mi}
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: course-data
{{- end }}
