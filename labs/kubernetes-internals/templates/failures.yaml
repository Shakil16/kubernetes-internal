{{- if .Values.labs.failures.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: failure-pending
  namespace: {{ include "kubernetes-internals.namespace" . }}
  labels:
    failure: pending
    {{- include "kubernetes-internals.labels" . | nindent 4 }}
spec:
  nodeSelector:
    course.example.com/nonexistent: "true"
  containers:
    - name: app
      image: {{ .Values.images.busybox | quote }}
      imagePullPolicy: IfNotPresent
      command: ["sleep", "7d"]
---
apiVersion: v1
kind: Pod
metadata:
  name: failure-crashloop
  namespace: {{ include "kubernetes-internals.namespace" . }}
  labels:
    failure: crashloop
    {{- include "kubernetes-internals.labels" . | nindent 4 }}
spec:
  containers:
    - name: app
      image: {{ .Values.images.busybox | quote }}
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c", "echo configuration missing >&2; exit 42"]
---
apiVersion: v1
kind: Pod
metadata:
  name: failure-imagepull
  namespace: {{ include "kubernetes-internals.namespace" . }}
  labels:
    failure: imagepull
    {{- include "kubernetes-internals.labels" . | nindent 4 }}
spec:
  containers:
    - name: app
      image: invalid.example.invalid/course/image:does-not-exist
---
apiVersion: v1
kind: Pod
metadata:
  name: failure-oom
  namespace: {{ include "kubernetes-internals.namespace" . }}
  labels:
    failure: oom
    {{- include "kubernetes-internals.labels" . | nindent 4 }}
spec:
  containers:
    - name: app
      image: {{ .Values.images.stress | quote }}
      imagePullPolicy: IfNotPresent
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "64M", "--vm-hang", "1"]
      resources:
        requests: {memory: 8Mi}
        limits: {memory: 24Mi}
{{- end }}
